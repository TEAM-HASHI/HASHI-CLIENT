name: Lighthouse CI

on:
  pull_request:
    branches:
      - develop
  workflow_dispatch:

concurrency:
  group: lighthouse-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    env:
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Test Lighthouse Helpers
        run: pnpm test:lighthouse

      - name: Check Lighthouse API
        run: pnpm smoke:lighthouse-api

      - name: Build Client
        run: pnpm build:client

      - name: Collect Lighthouse Results
        run: pnpm exec lhci collect

      - name: Assert Lighthouse Results
        run: pnpm exec lhci assert

      - name: Export Lighthouse Results
        if: always()
        run: pnpm exec lhci upload

      - name: Upload Lighthouse Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: lighthouse-reports
          retention-days: 14
          if-no-files-found: warn

      - name: Comment Lighthouse Results
        if: ${{ always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        uses: actions/github-script@v7
        with:
          script: |
            const { commentLighthouseResults } = require('./.github/scripts/lighthouse-comment.cjs')

            await commentLighthouseResults({ github, context, core })
