name: Vercel Preview Deployment

on:
  pull_request:
    branches:
      - develop
  push:
    branches:
      - develop
    paths:
      - '.github/workflows/vercel-preview.yml'
      - 'apps/client/**'
      - 'configs/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - 'vercel.json'

concurrency:
  group: vercel-preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy-preview:
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.deploy.outputs.url }}

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
      VERCEL_GIT_COMMIT_SHA: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Pull Vercel Environment
        run: pnpm exec vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Vercel Output
        run: pnpm exec vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Preview
        id: deploy
        run: |
          url=$(pnpm exec vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Comment Preview URL
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Client Preview deployed: ${{ steps.deploy.outputs.url }}`,
            })

  lighthouse:
    name: Lighthouse CI
    if: ${{ github.event_name == 'pull_request' && needs.deploy-preview.result == 'success' }}
    needs: deploy-preview
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Test Lighthouse Helpers
        run: pnpm test:lighthouse

      - name: Collect Lighthouse Results
        run: pnpm exec lhci collect --url='${{ needs.deploy-preview.outputs.url }}'

      - name: Validate Lighthouse Preview
        id: validate_preview
        run: node .github/scripts/lighthouse-preview-validation.cjs '${{ needs.deploy-preview.outputs.url }}'

      - name: Assert Lighthouse Results
        run: pnpm exec lhci assert

      - name: Export Lighthouse Results
        if: always()
        run: pnpm exec lhci upload

      - name: Upload Lighthouse Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: lighthouse-reports
          retention-days: 14
          if-no-files-found: warn

      - name: Comment Lighthouse Results
        if: ${{ always() && steps.validate_preview.outcome == 'success' && github.event.pull_request.head.repo.full_name == github.repository }}
        uses: actions/github-script@v7
        with:
          script: |
            const { commentLighthouseResults } = require('./.github/scripts/lighthouse-comment.cjs')

            await commentLighthouseResults({ github, context, core })
